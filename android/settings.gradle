pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null : "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }.call()

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // ✅ Upgraded Android Gradle Plugin to 8.3.2 (Flutter requires ≥8.3.0 soon)
    id "com.android.application" version "8.3.2" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include(":app")

// ✅ Add namespace fix for quick_actions plugin (missing namespace issue)
gradle.beforeProject { project ->
    if (project.name == "quick_actions") {
        project.afterEvaluate {
            if (project.hasProperty("android") && !project.android.hasProperty("namespace")) {
                project.android.namespace = "io.flutter.plugins.quickactions"
            }
        }
    }
}
